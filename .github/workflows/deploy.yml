name: Deploy to Oracle

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/oracle-cloud-sandbox || git clone git@github.com:DiazLighuen/oracle-cloud-sandbox.git ~/oracle-cloud-sandbox
            cd ~/oracle-cloud-sandbox
            git pull origin main
            mkdir -p cookies

            # Build and start all services using production config only
            docker compose -f docker-compose.yml up -d --build

            # Restart nginx so it picks up new container IPs after rebuild
            docker compose -f docker-compose.yml restart nginx

            # Apply pending migrations
            source .env
            docker compose -f docker-compose.yml exec -T db \
              psql -U "$DB_USER" -d "$DB_NAME" -f /docker-entrypoint-initdb.d/02-migrate.sql
