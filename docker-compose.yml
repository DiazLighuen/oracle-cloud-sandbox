services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./docker/postgres/migrate.sql:/docker-entrypoint-initdb.d/02-migrate.sql
    deploy:
      resources:
        limits:
          memory: 96M

  app:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: php_app
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 96M
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL}
      GOOGLE_YOUTUBE_REDIRECT_URL: ${GOOGLE_YOUTUBE_REDIRECT_URL}
      GOOGLE_IOS_CLIENT_ID: ${GOOGLE_IOS_CLIENT_ID}
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    restart: always
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "443:443"
    volumes:
      - ${NGINX_CONF_FILE:-./docker/nginx/local.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app
      - notifications
      - youtube
    deploy:
      resources:
        limits:
          memory: 48M

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Renews certificates twice a day; exits immediately if nothing to renew
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"

  notifications:
    build:
      context: ./services/notifications
      dockerfile: Dockerfile
      target: production
    container_name: notifications_svc
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - db
    environment:
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      DB_HOST: db
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 64M

  youtube:
    build:
      context: ./services/youtube
      dockerfile: Dockerfile
      target: production
    container_name: youtube_svc
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./cookies:/cookies
    deploy:
      resources:
        limits:
          memory: 448M

volumes:
  postgres_data: