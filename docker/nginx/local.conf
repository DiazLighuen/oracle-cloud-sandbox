upstream notifications {
    server notifications_svc:3000;
}

upstream youtube {
    server youtube_svc:8000;
}

server {
    listen 80;
    index index.php index.html;
    server_name localhost;
    root /var/www/html/public;

    # ── YouTube service ────────────────────────────────────────────────────
    location /api/youtube/ {
        proxy_pass http://youtube/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Google-Token $http_x_google_token;
    }

    # ── Notifications service HTTP endpoints ───────────────────────────────
    location /notifications/ {
        proxy_pass http://notifications;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── WebSocket proxy → Node.js notifications service ────────────────────
    location = /ws {
        proxy_pass http://notifications;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Static files / PHP ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
