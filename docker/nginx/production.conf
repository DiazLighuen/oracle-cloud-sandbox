# ── HTTP: ACME challenge passthrough + redirect everything else to HTTPS ──────
server {
    listen 80;
    server_name oracle-cloud-sandbox.duckdns.org;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: main application ───────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name oracle-cloud-sandbox.duckdns.org;
    index index.php index.html;
    root /var/www/html/public;

    ssl_certificate     /etc/letsencrypt/live/oracle-cloud-sandbox.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oracle-cloud-sandbox.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── YouTube service — disabled until Python service is deployed ──────────
    ## location /api/youtube/ {
    ##     proxy_pass http://youtube/;
    ##     proxy_set_header Host $host;
    ##     proxy_set_header X-Real-IP $remote_addr;
    ##     proxy_set_header X-Google-Token $http_x_google_token;
    ## }

    # ── Notifications service HTTP endpoints ───────────────────────────────
    location /notifications/ {
        proxy_pass http://notifications;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── WebSocket proxy → Node.js notifications service ────────────────────
    location = /ws {
        proxy_pass http://notifications;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Static files / PHP ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # Use Docker's internal resolver so nginx re-resolves the container IP
        # after a rebuild instead of caching the old one.
        resolver 127.0.0.11 valid=10s;
        set $fpm app:9000;
        fastcgi_pass $fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
